name: Deploy On Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API deps
        run: npm ci
        working-directory: factory-api

      - name: Run API tests
        run: npm test
        working-directory: factory-api

      - name: Install client deps
        run: npm ci
        working-directory: factory-client

      - name: Build client
        run: npm run build
        working-directory: factory-client

  deploy_web:
    name: Deploy Web (SSH)
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ secrets.DEPLOY_SSH_HOST != '' && secrets.DEPLOY_SSH_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.WEB_ROOT != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install client deps
        run: npm ci
        working-directory: factory-client

      - name: Build client
        run: npm run build
        working-directory: factory-client

      - name: Archive web build
        run: |
          cd factory-client
          tar -czf ../web-build.tgz build

      - name: Upload web build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          source: web-build.tgz
          target: /tmp

      - name: Extract web build on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script: |
            set -e
            mkdir -p "${{ secrets.WEB_ROOT }}"
            tar -xzf /tmp/web-build.tgz -C /tmp
            rm -rf "${{ secrets.WEB_ROOT }}"/*
            cp -R /tmp/build/. "${{ secrets.WEB_ROOT }}/"
            rm -rf /tmp/build /tmp/web-build.tgz

  deploy_api:
    name: Deploy API (SSH)
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ secrets.DEPLOY_SSH_HOST != '' && secrets.DEPLOY_SSH_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.API_ROOT != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload API source to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          source: factory-api/**
          target: /tmp/factory-release

      - name: Install API deps and restart service
        uses: appleboy/ssh-action@v1.0.3
        env:
          API_PM2_NAME: ${{ secrets.API_PM2_NAME }}
          API_ROOT: ${{ secrets.API_ROOT }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          envs: API_PM2_NAME,API_ROOT
          script: |
            set -e
            mkdir -p "$API_ROOT"
            rm -rf "$API_ROOT"/*
            cp -R /tmp/factory-release/factory-api/. "$API_ROOT/"
            cd "$API_ROOT"
            npm ci --omit=dev

            APP_NAME=${API_PM2_NAME:-factory-api}
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "pm2 is not installed on the server. Install pm2 and re-run deploy."
              exit 1
            fi

            pm2 describe "$APP_NAME" >/dev/null 2>&1 \
              && pm2 reload "$APP_NAME" --update-env \
              || pm2 start src/index.js --name "$APP_NAME"
            pm2 save

            rm -rf /tmp/factory-release
