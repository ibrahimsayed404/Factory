name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          cd factory-api && npm install
          cd ../factory-client && npm install
      - name: Lint (API)
        run: cd factory-api && npm run lint || true
      - name: Lint (Client)
        run: cd factory-client && npm run lint || true
      - name: Test (API)
        run: cd factory-api && npm test
      - name: Test (Client)
        run: cd factory-client && npm test
