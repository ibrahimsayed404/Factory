version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: factory_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d factory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./factory-api
    ports:
      - "4000:4000"
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgrespassword
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=factory_db
      - JWT_SECRET=supersecretjwtkeyforproductiononlychange_it
      - PORT=4000
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
